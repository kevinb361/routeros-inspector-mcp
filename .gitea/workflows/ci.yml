name: Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validation-only:
    name: Validation only
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run canonical validation gate
        run: make ci
